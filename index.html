<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollinations AI 聊天助手</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

</head>

<body class="bg-slate-900 text-slate-100 h-screen overflow-hidden">

<div class="flex h-full">

<!-- Sidebar -->
<aside id="sidebar" class="w-80 bg-slate-950 border-r border-slate-800 flex flex-col transition-transform duration-300 transform -translate-x-full md:translate-x-0 absolute md:relative z-20 h-full">

<div class="p-4 border-b border-slate-800">

<div class="flex items-center gap-2 mb-4">
<div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
<i data-lucide="bot" class="w-5 h-5 text-white"></i>
</div>
<h1 class="font-bold text-lg">AI 聊天助手</h1>
</div>

<button onclick="chatApp.newChat()" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-2 px-4 flex items-center justify-center gap-2 transition-colors">
<i data-lucide="plus" class="w-4 h-4"></i>
<span>新對話</span>
</button>

</div>

<div class="p-4 border-b border-slate-800">
<label class="text-xs text-slate-400 block mb-2">選擇模型</label>

<select id="modelSelector" onchange="chatApp.changeModel(this.value)" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
<option value="openai">OpenAI GPT-4o</option>
<option value="mistral">Mistral Large</option>
<option value="llama">Llama 3</option>
<option value="claude">Claude 3</option>
<option value="gemini">Gemini Pro</option>
</select>

</div>

<div class="flex-1 overflow-y-auto custom-scrollbar p-2" id="chatList"></div>

<div class="p-4 border-t border-slate-800 text-xs text-slate-500">

<div class="flex items-center gap-2 mb-2">
<i data-lucide="info" class="w-4 h-4"></i>
<span>使用 Pollinations AI API</span>
</div>

<button onclick="chatApp.clearAllChats()" class="text-red-400 hover:text-red-300 flex items-center gap-1 mt-2">
<i data-lucide="trash-2" class="w-3 h-3"></i>
清除所有對話
</button>

</div>

</aside>


<!-- Main -->
<main class="flex-1 flex flex-col bg-slate-900 relative">

<div id="messagesContainer" class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4"></div>

<div id="typingIndicator" class="hidden px-4 py-2">
<div class="flex items-center gap-2 text-slate-400 text-sm">

<div class="flex gap-1">
<div class="w-2 h-2 bg-slate-400 rounded-full typing-dot"></div>
<div class="w-2 h-2 bg-slate-400 rounded-full typing-dot"></div>
<div class="w-2 h-2 bg-slate-400 rounded-full typing-dot"></div>
</div>

<span>AI 思考中...</span>

</div>
</div>


<div class="p-4 border-t border-slate-800 bg-slate-950">

<div id="filePreviewArea" class="hidden mb-3 flex flex-wrap gap-2"></div>

<div class="flex items-end gap-2 bg-slate-900 rounded-2xl border border-slate-700 p-2 focus-within:border-blue-500">

<button onclick="document.getElementById('fileInput').click()" class="p-2 hover:bg-slate-800 rounded-xl text-slate-400 hover:text-blue-400">
<i data-lucide="paperclip" class="w-5 h-5"></i>
</button>

<input type="file" id="fileInput" class="hidden" multiple
accept="image/*,.txt,.js,.html,.css,.json,.py,.java,.cpp,.c,.php,.rb,.go,.rs"
onchange="chatApp.handleFileSelect(event)">

<textarea id="messageInput"
rows="1"
placeholder="輸入訊息..."
class="flex-1 bg-transparent border-none outline-none resize-none py-2 px-1"
onkeydown="chatApp.handleKeyDown(event)"
oninput="chatApp.autoResize(this)">
</textarea>

<button onclick="chatApp.sendMessage()" id="sendButton" class="p-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl">
<i data-lucide="send" class="w-5 h-5"></i>
</button>

</div>

</div>

</main>

</div>

<script src="app.js"></script>

</body>
</html>
