<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollinations AI 聊天助手</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
<div class="flex h-full">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="flex items-center gap-2 mb-4">
                <div class="logo"><i data-lucide="bot"></i></div>
                <h1 class="title">AI 聊天助手</h1>
            </div>
            <button onclick="chatApp.newChat()" class="btn-new-chat">
                <i data-lucide="plus"></i> 新對話
            </button>
        </div>

        <div class="sidebar-model">
            <label>選擇模型</label>
            <select id="modelSelector" onchange="chatApp.changeModel(this.value)">
                <option value="openai">OpenAI GPT-4o</option>
                <option value="mistral">Mistral Large</option>
                <option value="llama">Llama 3</option>
                <option value="claude">Claude 3</option>
                <option value="gemini">Gemini Pro</option>
            </select>
        </div>

        <div id="chatList" class="chat-list"></div>

        <div class="sidebar-footer">
            <div class="info"><i data-lucide="info"></i> 使用 Pollinations AI API</div>
            <button onclick="chatApp.clearAllChats()" class="btn-clear">清除所有對話</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <div class="mobile-header">
            <button onclick="chatApp.toggleSidebar()"><i data-lucide="menu"></i></button>
            <span id="mobileTitle">新對話</span>
            <button onclick="chatApp.newChat()"><i data-lucide="plus"></i></button>
        </div>

        <div class="desktop-header">
            <h2 id="currentChatTitle">新對話</h2>
            <span id="currentModelBadge">OpenAI</span>
            <div class="header-buttons">
                <button onclick="chatApp.editTitle()"><i data-lucide="edit-2"></i></button>
                <button onclick="chatApp.deleteCurrentChat()"><i data-lucide="trash-2"></i></button>
            </div>
        </div>

        <div id="messagesContainer" class="messages"></div>

        <div id="typingIndicator" class="typing-indicator hidden">
            <div class="dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <span>AI 思考中...</span>
        </div>

        <div class="input-area">
            <div id="filePreviewArea" class="file-preview-area hidden"></div>
            <div class="input-wrapper">
                <button onclick="document.getElementById('fileInput').click()"><i data-lucide="paperclip"></i></button>
                <input type="file" id="fileInput" class="hidden" multiple onchange="chatApp.handleFileSelect(event)">
                <textarea id="messageInput" placeholder="輸入訊息..." onkeydown="chatApp.handleKeyDown(event)" oninput="chatApp.autoResize(this)"></textarea>
                <button id="sendButton" onclick="chatApp.sendMessage()"><i data-lucide="send"></i></button>
            </div>
            <div class="disclaimer">AI 可能會產生不準確的資訊，請務必驗證重要資訊。</div>
        </div>

        <div id="sidebarOverlay" onclick="chatApp.toggleSidebar()" class="sidebar-overlay hidden"></div>
    </main>
</div>
<script src="app.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>{lucide.createIcons(); window.chatApp=new ChatApp();});</script>
</body>
</html>
